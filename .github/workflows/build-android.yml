name: Build & Deploy Hooder Android

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: "Play track (internal/alpha/beta/production)"
        default: "alpha"
        required: true
      status:
        description: "Release status (draft/completed)"
        default: "draft"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Keystore yerleştir
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS" | base64 --decode > app/keystore.jks
          cat > app/keystore.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: versionCode hesapla (1041'in üstü, artan)
        run: echo "VC=$((1100 + ${{ github.run_number }}))" >> "$GITHUB_ENV"

      - name: AAB derle (release)
        env:
          ORG_GRADLE_PROJECT_MAPBOX_DOWNLOAD_TOKEN: ${{ secrets.MAPBOX_DOWNLOAD_TOKEN }}
          ORG_GRADLE_PROJECT_MAPBOX_PUBLIC_TOKEN:   ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
          ORG_GRADLE_PROJECT_HOODER_APP_KEY:        ${{ secrets.HOODER_APP_KEY }}
          ORG_GRADLE_PROJECT_VERSION_CODE:          ${{ env.VC }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hooder-${{ github.run_number }}.aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Google Play'e yükle (closed/alpha, draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.realvirtuality.landlord
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'alpha' }}
          status: ${{ github.event.inputs.status || 'draft' }}
